<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Researcher</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="hero">
          <div>
            <p class="eyebrow">licensed visual search</p>
            <h1>Image Researcher</h1>
          </div>
          <p>Exact-source search, local scoring, clean exports.</p>
        </header>

        <form id="researchForm">
          <label class="field">
            <span class="field-title">Image prompt</span>
            <textarea id="prompt" required rows="4" placeholder="a cozy futuristic city at night with soft lights"></textarea>
          </label>

          <label class="field">
            <span class="field-title">Style</span>
            <input id="style" type="text" placeholder="realistic, cinematic, high quality" />
          </label>

          <div class="split">
            <label class="field">
              <span class="field-title">Orientation</span>
              <select id="orientation">
                <option value="any">any</option>
                <option value="landscape">landscape</option>
                <option value="portrait">portrait</option>
                <option value="square">square</option>
              </select>
            </label>

            <label class="field">
              <span class="field-title">Type</span>
              <select id="imageType">
                <option value="any">any</option>
                <option value="photo">photo</option>
                <option value="diagram">diagram</option>
                <option value="illustration">illustration</option>
                <option value="icon">icon</option>
              </select>
            </label>

            <label class="field">
              <span class="field-title">
                Images
                <output id="candidateValue">6</output>
              </span>
              <input id="maxCandidates" type="range" min="1" max="24" value="6" />
              <span class="range-scale"><span>1</span><span>12</span><span>24</span></span>
            </label>
          </div>

          <button id="submitBtn" type="submit">Research Image</button>
        </form>

        <div id="progressWrap" class="progress-wrap hidden">
          <div class="progress-track"><div id="progressBar"></div></div>
          <div id="statusText" class="status">Creating search plan...</div>
        </div>
      </section>

      <section id="result" class="result hidden"></section>
    </main>
    <script src="/static/script.js"></script>
  </body>
</html>
