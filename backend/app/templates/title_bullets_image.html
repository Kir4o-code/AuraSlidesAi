<div class="slide__content split-layout {{ slide.content_classes }}">
  <div class="flex flex-col justify-start gap-10">
    <h3 class="heading" style="font-size: {{ slide.heading_font_size }}px;">{{ slide.title }}</h3>
    <ul class="bullet-list">
      {% for bullet in slide.bullets %}
      <li style="font-size: {{ slide.body_font_size }}px;">{{ bullet }}</li>
      {% endfor %}
    </ul>
    {% if slide.notes %}
    <p class="caption" style="font-size: {{ slide.small_font_size }}px;">{{ slide.notes }}</p>
    {% endif %}
  </div>
  <div class="image-card">
    {% if slide.image_asset and slide.image_asset.render_src %}
    <img class="resolved-image" src="{{ slide.image_asset.render_src }}" alt="{{ slide.image_asset.alt }}" />
    {% else %}
    <div class="image-card__query">{{ slide.image_prompt }}</div>
    {% endif %}
  </div>
</div>
