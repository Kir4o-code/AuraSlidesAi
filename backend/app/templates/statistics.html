<div class="slide__content">
  <h2 class="heading" style="font-size: {{ slide.heading_font_size }}px;">{{ slide.title }}</h2>
  <div class="stats-grid">
    {% for stat in slide.statistics %}
    <article class="stat-card">
      <p class="stat-value" style="font-size: {{ slide.value_font_size }}px;">{{ stat.value }}</p>
      <p class="stat-label" style="font-size: {{ slide.card_font_size }}px;">{{ stat.label }}</p>
      {% if stat.detail %}
      <p style="font-size: {{ slide.small_font_size }}px;">{{ stat.detail }}</p>
      {% endif %}
    </article>
    {% endfor %}
  </div>
  {% if slide.notes %}
  <p class="caption" style="font-size: {{ slide.small_font_size }}px;">{{ slide.notes }}</p>
  {% endif %}
</div>
