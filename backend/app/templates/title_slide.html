<div class="slide__content slide__content--center {{ slide.content_classes }}">
  <h1 class="title" style="font-size: {{ slide.title_font_size }}px;">{{ slide.title }}</h1>
  {% if slide.subtitle %}
  <p class="subtitle" style="font-size: {{ slide.subtitle_font_size }}px; margin-top: 40px;">{{ slide.subtitle }}</p>
  {% endif %}
  {% if slide.notes %}
  <p class="caption" style="font-size: {{ slide.small_font_size }}px; margin-top: 48px;">{{ slide.notes }}</p>
  {% endif %}
</div>
