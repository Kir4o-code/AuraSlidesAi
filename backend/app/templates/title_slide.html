<div class="slide__content slide__content--center">
  <h1 class="title" style="font-size: {{ slide.title_font_size }}px;">{{ slide.title }}</h1>
  {% if slide.subtitle %}
  <p class="subtitle" style="font-size: {{ slide.subtitle_font_size }}px;">{{ slide.subtitle }}</p>
  {% endif %}
  {% if slide.notes %}
  <p class="caption">{{ slide.notes }}</p>
  {% endif %}
</div>
