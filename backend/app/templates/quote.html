<div class="slide__content slide__content--center {{ slide.content_classes }}">
  <blockquote class="quote-block">
    <p class="quote-text" style="font-size: {{ slide.quote_font_size }}px;">{{ slide.quote }}</p>
    {% if slide.attribution %}
    <footer class="quote-attribution" style="font-size: {{ slide.subtitle_font_size }}px;">— {{ slide.attribution }}</footer>
    {% endif %}
  </blockquote>
  {% if slide.notes %}
  <p class="caption" style="font-size: {{ slide.small_font_size }}px; margin-top: 40px;">{{ slide.notes }}</p>
  {% endif %}
</div>
