<div class="slide__content {{ slide.content_classes }}">
  <h2 class="heading" style="font-size: {{ slide.heading_font_size }}px;">{{ slide.title }}</h2>
  <div class="timeline-list">
    {% for step in slide.timeline %}
    <div class="timeline-item">
      <div class="timeline-label" style="font-size: {{ slide.card_font_size }}px;">{{ step.label }}</div>
      <div style="font-size: {{ slide.small_font_size }}px;">{{ step.detail }}</div>
    </div>
    {% endfor %}
  </div>
</div>
