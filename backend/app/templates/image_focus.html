<div class="slide__content image-focus-layout">
  <div>
    <div class="section-label">Image Focus</div>
    <h2 class="heading">{{ slide.title }}</h2>
    <p class="caption">{{ slide.caption }}</p>
  </div>
  <div class="hero-image-placeholder">
    {% if slide.image_asset.render_src %}
    <img class="resolved-image resolved-image--hero" src="{{ slide.image_asset.render_src }}" alt="{{ slide.image_asset.alt }}" />
    {% else %}
    <div class="hero-image-placeholder__role">{{ slide.image_asset.role.replace("_", " ") }}</div>
    <div class="hero-image-placeholder__query">{{ slide.image_asset.query }}</div>
    {% endif %}
  </div>
</div>
