<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smoke Test</title>
    <style>
      body {
        margin: 0;
        font-family: 'Aptos Display', 'Segoe UI', sans-serif;
        color: #f8fafc;
        background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      }

      .slide {
        background:
          radial-gradient(circle at top right, rgba(139, 92, 246, 0.22), transparent 34%),
          radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.12), transparent 28%),
          linear-gradient(145deg, #0f172a 0%, #111827 100%);
      }

      .slide__theme-bar {
        background: linear-gradient(180deg, #8b5cf6, #8b5cf6);
      }

      .slide__glow--one {
        background: rgba(139, 92, 246, 0.18);
      }

      .slide__glow--two {
        background: rgba(139, 92, 246, 0.1);
      }

      .eyebrow,
      .section-label {
        color: #8b5cf6;
      }

      .title,
      .heading,
      .bullet-list li,
      .image-card__query,
      .hero-image-placeholder__query,
      .timeline-item__title,
      .stat-card__value,
      .quote-block__text {
        color: #f8fafc;
      }

      .subtitle,
      .image-card__meta,
      .caption,
      .closing,
      .timeline-item__detail,
      .stat-card__detail,
      .quote-block__attribution {
        color: #cbd5e1;
      }

      .image-card,
      .hero-image-placeholder,
      .comparison-card,
      .stat-card,
      .quote-block {
        border-color: rgba(148, 163, 184, 0.22);
        background: #111c34;
        box-shadow: ;
      }

      .image-card__badge,
      .hero-image-placeholder__role {
        background: #111c34;
        color: #8b5cf6;
      }

      .comparison-card--accent {
        background: linear-gradient(180deg, rgba(139, 92, 246, 0.09), #111c34);
      }
    </style>
  </head>
  <body
    class="theme theme--modern_dark"
    style="
      --bg-start: #0f172a;
      --bg-end: #111827;
      --panel: #111c34;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #8b5cf6;
      --accent-strong: #8b5cf6;
      --accent-soft: #c4b5fd;
      --border: rgba(148, 163, 184, 0.22);
      --accent-rgb: 139, 92, 246;
      --font-display: 'Aptos Display', 'Segoe UI', sans-serif;
    "
  >
    
    <section class="slide slide--title_slide">
      <div class="slide__glow slide__glow--one"></div>
      <div class="slide__glow slide__glow--two"></div>
      <div class="slide__theme-bar"></div>
      <div class="slide__content slide__content--center">
  <div class="eyebrow">AI-generated presentation</div>
  <h1 class="title" style="font-size: 50px;">Smoke Test</h1>
  
  <p class="subtitle" style="font-size: 22px;">Subtitle</p>
  
  
  <p class="caption">Notes</p>
  
</div>
    </section>
    
    <section class="slide slide--title_bullets">
      <div class="slide__glow slide__glow--one"></div>
      <div class="slide__glow slide__glow--two"></div>
      <div class="slide__theme-bar"></div>
      <div class="slide__content">
  <div class="section-label">Key Points</div>
  <h2 class="heading" style="font-size: 37px;">Bullets</h2>
  <ul class="bullet-list">
    
    <li style="font-size: 19px;">One</li>
    
    <li style="font-size: 19px;">Two</li>
    
    <li style="font-size: 19px;">Three</li>
    
  </ul>
  
</div>
    </section>
    
    <section class="slide slide--statistics">
      <div class="slide__glow slide__glow--one"></div>
      <div class="slide__glow slide__glow--two"></div>
      <div class="slide__theme-bar"></div>
      <div class="slide__content">
  <div class="section-label">Statistics</div>
  <h2 class="heading" style="font-size: 35px;">Stats</h2>
  <div class="stats-grid">
    
    <article class="stat-card">
      <p class="stat-card__value" style="font-size: 32px;">42</p>
      <p class="stat-card__label" style="font-size: 15px;">Value</p>
      
      <p class="stat-card__detail" style="font-size: 14px;">Details</p>
      
    </article>
    
  </div>
  
</div>
    </section>
    
  </body>
</html>
