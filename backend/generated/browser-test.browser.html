<html><head><style>
@page {
  size: 1280px 720px;
  margin: 0;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
}

.slide {
  position: relative;
  width: 1280px;
  height: 720px;
  padding: 44px 56px;
  page-break-after: always;
  overflow: hidden;
}

.slide:last-child {
  page-break-after: auto;
}

.slide__theme-bar {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 12px;
}

.slide__glow {
  position: absolute;
  border-radius: 999px;
  filter: blur(10px);
  opacity: 0.75;
}

.slide__glow--one {
  top: -50px;
  right: 70px;
  width: 220px;
  height: 220px;
}

.slide__glow--two {
  bottom: -70px;
  left: 150px;
  width: 260px;
  height: 260px;
}

.slide__content {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.slide__content--center {
  align-items: center;
  text-align: center;
}

.eyebrow,
.section-label {
  margin-bottom: 14px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.title {
  max-width: 860px;
  margin: 0;
  font-size: 36px;
  line-height: 1.05;
  letter-spacing: -0.04em;
}

.subtitle {
  max-width: 760px;
  margin: 18px 0 0;
  font-size: 16px;
  line-height: 1.45;
}

.heading {
  max-width: 840px;
  margin: 0 0 18px;
  font-size: 27px;
  line-height: 1.12;
  letter-spacing: -0.03em;
}

.bullet-list {
  max-width: 840px;
  margin: 0;
  padding-left: 28px;
}

.bullet-list li {
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.4;
}

.split-layout {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 36px;
  align-items: center;
}

.image-card,
.hero-image-placeholder {
  min-height: 260px;
  padding: 22px;
  border: 1px solid;
  border-radius: 28px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.98)),
    repeating-linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.12),
      rgba(255, 255, 255, 0.12) 16px,
      transparent 16px,
      transparent 32px
    );
}

.image-card {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.resolved-image {
  width: 100%;
  max-height: 220px;
  object-fit: cover;
  border-radius: 22px;
  border: 1px solid rgba(0, 0, 0, 0.08);
  background: rgba(255, 255, 255, 0.5);
}

.resolved-image--hero {
  max-height: 100%;
  height: 100%;
}

.image-card__badge,
.hero-image-placeholder__role {
  display: inline-flex;
  align-self: flex-start;
  padding: 7px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  text-transform: capitalize;
}

.image-card__query,
.hero-image-placeholder__query {
  margin-top: 14px;
  font-size: 17px;
  line-height: 1.2;
  font-weight: 700;
}

.image-card__meta {
  margin-top: 14px;
  font-size: 10px;
}

.image-focus-layout {
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 36px;
  align-items: center;
}

.comparison-layout {
  display: grid;
  gap: 20px;
}

.comparison-layout__columns {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}

.comparison-card,
.stat-card,
.quote-block {
  padding: 20px;
  border-radius: 20px;
  border: 1px solid;
}

.comparison-card--accent {
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.98));
}

.comparison-card__label,
.stat-card__label {
  margin: 0 0 10px;
  font-size: 11px;
  font-weight: 700;
}

.timeline-list {
  display: grid;
  gap: 12px;
  margin-top: 6px;
}

.timeline-item {
  display: grid;
  grid-template-columns: 14px 1fr;
  gap: 12px;
  align-items: start;
}

.timeline-item__marker {
  width: 14px;
  height: 14px;
  margin-top: 6px;
  border-radius: 999px;
  box-shadow: 0 0 0 8px rgba(0, 0, 0, 0.04);
}

.timeline-item__title,
.quote-block__text,
.stat-card__value {
  margin: 0;
}

.timeline-item__title {
  font-size: 18px;
  line-height: 1.2;
}

.timeline-item__detail,
.stat-card__detail,
.quote-block__attribution {
  margin: 8px 0 0;
  font-size: 13px;
  line-height: 1.45;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
  margin: 6px 0 4px;
}

.stat-card__value {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.04em;
}

.quote-layout {
  display: grid;
  gap: 16px;
  align-content: center;
}

.quote-block__text {
  font-size: 28px;
  line-height: 1.18;
  letter-spacing: -0.03em;
}

.caption,
.closing {
  max-width: 760px;
  margin: 16px 0 0;
  font-size: 16px;
  line-height: 1.45;
}

@media print {
  .comparison-layout__columns,
  .stats-grid {
    break-inside: avoid;
  }
}

</style>
</head><body><h1>Hello</h1></body></html>
